version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zuno-postgres
    restart: always
    environment:
      POSTGRES_USER: zuno_user
      POSTGRES_PASSWORD: zuno_password # Hãy đổi mật khẩu này trong file .env khi lên production
      POSTGRES_DB: zuno_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zuno-backend
    restart: always
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://zuno_user:zuno_password@postgres:5432/zuno_db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      FRONTEND_URL: http://${DOMAIN_NAME}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${DOMAIN_NAME}
        NEXT_PUBLIC_API_BASE_URL: http://${DOMAIN_NAME}
    container_name: zuno-frontend

    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: zuno-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./mock-bank:/usr/share/nginx/html/mock-bank:ro # Phục vụ trực tiếp file tĩnh của mock-bank
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
